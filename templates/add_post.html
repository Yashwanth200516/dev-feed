{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8 col-md-10">

        <div class="card shadow border-0 mt-4">

            <div class="card-body p-4">

                <h2 class="mb-4 text-center">
                    ✍️ Create New Post
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Title
                        </label>

                        <input
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="What's your post about?"
                            required
                        >
                    </div>

                    <!-- Content -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Content
                        </label>

                        <textarea
                            name="area"
                            rows="8"
                            class="form-control"
                            placeholder="Share your thoughts..."
                            required
                        ></textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-success flex-grow-1"
                        >
                            Publish Post 🚀
                        </button>

                        <a
                            href="/"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
